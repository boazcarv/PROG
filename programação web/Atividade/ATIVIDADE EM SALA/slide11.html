<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Posicionamento Relativo</title>
    <link rel="stylesheet" href="slide11.css">
</head>
<body>

    <p>O texto ao final desta sentença <span class="super">está sobrescrito</span>.</p>
    
    <p>O texto ao final desta sentença <span class="sub">está subscrito</span>.</p>
    
    <p>O texto ao final desta sentença <span class="shiftleft">está deslocado para a esquerda</span>.</p>
    
    <p>O texto ao final desta sentença <span class="shiftright">está deslocado para a direita</span>.</p>

</body>
</html>
