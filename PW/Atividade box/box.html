<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>Exemplo</title>
	<style type="text/css">
		body {
			background-color: #f0f8ff; 
			font-family: Arial, sans-serif;
		}
		div.ex {
			width: 220px;
			padding: 10px;
			border: 5px solid rgb(128, 128, 128);
			margin: 0px;
			background-color: #ffffff; 
		}
		div.ex-largura {
			width: 320px; 
			padding: 10px;
			border: 5px solid #666;
			margin: 10px;
			background-color: #fff8dc;
		}
		
		div.ex-preenchimento{
			width: 220px;
			padding: 30px; 
			border: 5px solid #666;
			margin: 10px;
			background-color: #e6ffe6;
		}
	
		div.ex-borda {
			width: 220px;
			padding: 10px;
			border: 12px solid #ff7f7f; 
			margin: 10px;
			background-color: #ffffff;
		}
	
		div.ex-margem {
			width: 220px;
			padding: 20px;
			border: 5px solid #666;
			margin: 30px;
			background-color: #f0f8ff;
		}
	</style>
</head>
<body>
	<div class="ex">
		Exemplo original: largura da área de conteúdo 220px
	</div>
	<div class="ex-largura">
		Aumentei a largura para 320px
	</div>
	<div class="ex-preenchimento">
		Aumentei o padding para 30px
	</div>
	<div class="ex-borda">
		Aumentei a borda para 12px
	</div>
	<div class="ex-margem">
		Aumentei a margem para 30px
	</div>
	<p>Compare cada caixa para perceber a mudança em um elemento por vez.</p>
</body>
</html>
